<script>
$(document).ready(function(){

  $("#myinput").on("keyup", function(){
    var value = $(this).val().toLowerCase();

    $(".bike-card").each(function(){
      var text = $(this).find("h3").text().toLowerCase();

      if(text.indexOf(value) > -1){
        $(this).css("display", "");  
      } else {
        $(this).css("display", "none"); 
      }
    });

  });

});
</script>
