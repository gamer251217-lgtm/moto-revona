  <style>
  *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

   body{
    background:#0f0f0f;
    color:white;
}

 header{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 80px;
    background:rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    z-index:1000;
}
.logo{
    font-size:22px;
    font-weight:700;
    letter-spacing:2px;
}

.logo span{
    color:#e10600;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:40px;
    font-size:14px;
    position:relative;
    transition:0.3s;
}

nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#e10600;
    transition:0.3s;
}

nav a:hover{
    color:#e10600;
}

nav a:hover::after{
    width:100%;
}
#container{
     background: rgba(255,255,255,0.05);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    height: 650px;
    margin-top: 100px;
    margin-left: 50px;
    margin-right: 50px;
    margin-bottom: 50px;
    display: flex;
    justify-content: center;
    align-items: center;

}
p{
    font-size: 100px;
    color: #e10600;
    font-style: italic;
}

footer{
    background:#111;
    padding:30px;
    text-align:center;
    color:#777;
    font-size:14px;
    position: relative;

}

  </style>
